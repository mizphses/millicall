name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Pin Python 3.12
        run: uv python install 3.12

      - name: Sync dependencies (dev extra, locked)
        run: uv sync --extra dev --frozen

      - name: Ruff lint
        run: uv run ruff check .

      - name: Pytest
        run: uv run pytest -q

  frontend:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies (locked)
        run: npm ci

      - name: Build (panda codegen + tsc + vite)
        run: npm run build

      - name: Vitest
        run: npx vitest run
