name: build-images

on:
  workflow_call:
    inputs:
      sha_tag:
        required: true
        type: string
      moving_tag:
        required: false
        type: string
        default: ''

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push core (amd64)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ghcr.io/mizphses/millicall-core:${{ inputs.sha_tag }}
            ${{ inputs.moving_tag != '' && format('ghcr.io/mizphses/millicall-core:{0}', inputs.moving_tag) || '' }}
          cache-from: type=gha,scope=core-amd64
          cache-to: type=gha,mode=max,scope=core-amd64

      - name: Build & push freeswitch (amd64)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/freeswitch/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ghcr.io/mizphses/millicall-freeswitch:${{ inputs.sha_tag }}
            ${{ inputs.moving_tag != '' && format('ghcr.io/mizphses/millicall-freeswitch:{0}', inputs.moving_tag) || '' }}
          cache-from: type=gha,scope=freeswitch-amd64
          cache-to: type=gha,mode=max,scope=freeswitch-amd64
