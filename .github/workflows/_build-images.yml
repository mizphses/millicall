name: build-images

on:
  workflow_call:
    inputs:
      sha_tag:
        required: true
        type: string
      moving_tag:
        required: false
        type: string
        default: ''

# マルチアーチ (linux/amd64 + linux/arm64) イメージを発行する。
# FreeSWITCH をソースからビルドするため QEMU エミュレーションは極端に遅く不安定。
# 各アーキを「ネイティブランナー」(amd64=ubuntu-24.04 / arm64=ubuntu-24.04-arm) で
# ビルドして digest で push し、merge ジョブで manifest list に束ねる。
# ubuntu-24.04-arm は public リポジトリのため無料で利用できる。
#
# buildx キャッシュは type=gha ではなく GHCR の registry キャッシュを使う
# (type=gha は GitHub Actions ストレージを消費し FreeSWITCH のソースビルドで
#  課金枠を圧迫する)。キャッシュ tag はアーキごとに分ける。
jobs:
  build:
    runs-on: ${{ matrix.platform.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image:
          - { name: core, file: docker/Dockerfile }
          - { name: freeswitch, file: docker/freeswitch/Dockerfile }
          - { name: netd, file: docker/netd/Dockerfile }
        platform:
          - { arch: amd64, runner: ubuntu-24.04, tag: linux/amd64 }
          - { arch: arm64, runner: ubuntu-24.04-arm, tag: linux/arm64 }
    env:
      DOCKER_BUILD_RECORD_UPLOAD: false
      IMAGE: ghcr.io/mizphses/millicall-${{ matrix.image.name }}
      CACHE: ghcr.io/mizphses/millicall-buildcache:${{ matrix.image.name }}-${{ matrix.platform.arch }}
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # digest で push する (タグは付けない)。merge ジョブが manifest list に束ねる。
      - name: Build & push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.image.file }}
          platforms: ${{ matrix.platform.tag }}
          provenance: false
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=registry,ref=${{ env.CACHE }}
          cache-to: type=registry,ref=${{ env.CACHE }},mode=max,image-manifest=true,oci-mediatypes=true

      # digest をファイル名にした空ファイルを artifact として渡す (中身は不要)。
      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digest-${{ matrix.image.name }}-${{ matrix.platform.arch }}
          path: /tmp/digests/*
          retention-days: 1
          if-no-files-found: error

  # アーキ別 digest を manifest list に束ねてタグを付与する。
  merge:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image: [core, freeswitch, netd]
    env:
      IMAGE: ghcr.io/mizphses/millicall-${{ matrix.image }}
      SHA_TAG: ${{ inputs.sha_tag }}
      MOVING_TAG: ${{ inputs.moving_tag }}
    steps:
      - uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-${{ matrix.image }}-*
          merge-multiple: true

      # sha_tag は常に付与、moving_tag (dev / latest) は非空のときだけ付与する。
      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          tags="-t ${IMAGE}:${SHA_TAG}"
          if [ -n "${MOVING_TAG}" ]; then
            tags="${tags} -t ${IMAGE}:${MOVING_TAG}"
          fi
          # shellcheck disable=SC2086
          docker buildx imagetools create ${tags} \
            $(printf "${IMAGE}@sha256:%s " *)

      - name: Inspect
        run: docker buildx imagetools inspect "${IMAGE}:${SHA_TAG}"
