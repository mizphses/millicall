name: build-images

on:
  workflow_call:
    inputs:
      sha_tag:
        required: true
        type: string
      moving_tag:
        required: false
        type: string
        default: ''

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    # buildx キャッシュは type=gha ではなく GHCR の registry キャッシュを使う。
    # type=gha は GitHub Actions ストレージ（Pro プランで 2GB/月まで）を消費し、
    # FreeSWITCH のソースビルドで数 GB に達して課金枠を圧迫した実績がある。
    # GHCR は public パッケージのストレージが無料のため、専用イメージ
    # millicall-buildcache の tag ごとにキャッシュを保存する（build-record
    # アーティファクトのアップロードも同じ理由で無効化する）。
    env:
      DOCKER_BUILD_RECORD_UPLOAD: false
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push core (amd64)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ghcr.io/mizphses/millicall-core:${{ inputs.sha_tag }}
            ${{ inputs.moving_tag != '' && format('ghcr.io/mizphses/millicall-core:{0}', inputs.moving_tag) || '' }}
          cache-from: type=registry,ref=ghcr.io/mizphses/millicall-buildcache:core-amd64
          cache-to: type=registry,ref=ghcr.io/mizphses/millicall-buildcache:core-amd64,mode=max,image-manifest=true,oci-mediatypes=true

      - name: Build & push freeswitch (amd64)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/freeswitch/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ghcr.io/mizphses/millicall-freeswitch:${{ inputs.sha_tag }}
            ${{ inputs.moving_tag != '' && format('ghcr.io/mizphses/millicall-freeswitch:{0}', inputs.moving_tag) || '' }}
          cache-from: type=registry,ref=ghcr.io/mizphses/millicall-buildcache:freeswitch-amd64
          cache-to: type=registry,ref=ghcr.io/mizphses/millicall-buildcache:freeswitch-amd64,mode=max,image-manifest=true,oci-mediatypes=true

      - name: Build & push netd (amd64)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/netd/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ghcr.io/mizphses/millicall-netd:${{ inputs.sha_tag }}
            ${{ inputs.moving_tag != '' && format('ghcr.io/mizphses/millicall-netd:{0}', inputs.moving_tag) || '' }}
          cache-from: type=registry,ref=ghcr.io/mizphses/millicall-buildcache:netd-amd64
          cache-to: type=registry,ref=ghcr.io/mizphses/millicall-buildcache:netd-amd64,mode=max,image-manifest=true,oci-mediatypes=true
