services:
  # ------------------------------------------------------------------
  # docker-proxy: Docker Engine HTTP API を最小 API のみに限定して公開する。
  #
  # Tecnativa/docker-socket-proxy を使用し、core が必要とする操作のみ許可:
  #   CONTAINERS=1      コンテナ一覧・検査
  #   INFO=1            /info エンドポイント
  #   VERSION=1         /version エンドポイント
  #   ALLOW_RESTARTS=1  POST /containers/{id}/restart のみ許可（H4: POST=1 を廃止）
  #
  # H4 修正: POST=1 は kill/stop/start/create 等の全 POST を許可するため廃止。
  # Tecnativa の ALLOW_RESTARTS=1 フラグが POST /restart のみを粒度細かく許可する。
  # IMAGES・EXEC・volumes・swarm・secrets・networks 等は全て 0（デフォルト）のまま。
  #
  # core は network_mode: host のため 127.0.0.1:2375 でプロキシに到達できる。
  # core 側の環境変数: MILLICALL_DOCKER_PROXY_URL=http://127.0.0.1:2375
  #
  # セキュリティ: raw docker.sock は proxy コンテナにのみ :ro でマウントする。
  # core・freeswitch・netd は docker.sock を一切マウントしない。
  # ------------------------------------------------------------------
  docker-proxy:
    # M8: :latest を廃止して具体的なバージョンタグに固定する。
    # ダイジェスト固定 (@sha256:...) が理想だが offline では解決できないため
    # バージョンタグで固定し、定期的なアップデート時に sha256 ダイジストへの移行を推奨。
    image: ghcr.io/tecnativa/docker-socket-proxy:0.3.0
    environment:
      # コンテナ一覧・検査を許可
      - CONTAINERS=1
      # POST /containers/{id}/restart のみ許可（H4: POST=1 廃止、ALLOW_RESTARTS=1 で代替）
      # ALLOW_RESTARTS=1 は restart エンドポイントのみを粒度細かく許可し、
      # kill/stop/start/create は許可しない。
      - ALLOW_RESTARTS=1
      # /info エンドポイントを許可
      - INFO=1
      # /version エンドポイントを許可
      - VERSION=1
      # その他は全て 0（デフォルト）のまま:
      # POST=0, IMAGES=0, EXEC=0, VOLUMES=0, NETWORKS=0, SWARM=0, SECRETS=0 ...
    volumes:
      # Docker socket は read-only で proxy コンテナのみにマウントする。
      # core・freeswitch・netd にはマウントしない。
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      # core (network_mode: host) から 127.0.0.1:2375 でアクセスできるようにバインドする。
      # ループバックバインドにより外部ネットワークからのアクセスを防ぐ。
      - "127.0.0.1:2375:2375"
    # H3: 全サービスに no-new-privileges を適用（特権昇格防止）
    security_opt:
      - "no-new-privileges:true"
    mem_limit: 128m
    pids_limit: 64
    restart: unless-stopped

  core:
    image: ghcr.io/mizphses/millicall-core:${MILLICALL_VERSION:-latest}
    pull_policy: always
    network_mode: host
    env_file:
      - .env
    environment:
      # Docker socket-proxy 経由の Docker API エンドポイント。
      # core は raw docker.sock に一切触れない。docker-proxy コンテナが仲介する。
      - MILLICALL_DOCKER_PROXY_URL=http://127.0.0.1:2375
    volumes:
      - ./data:/app/data
      # netd との UNIX ソケット共有。netd が /run/millicall/netd.sock を作成し、
      # core の NetdClient がこのパスに接続する。
      # core は netd の起動を待たず (lazy connect)、netd が未起動の場合は各呼び出しでエラーを返す。
      - millicall-run:/run/millicall
    depends_on:
      - docker-proxy
    healthcheck:
      test:
        - CMD-SHELL
        - "python -c \"import os,urllib.request,sys; p=os.environ.get('MILLICALL_HTTP_PORT','80'); sys.exit(0 if urllib.request.urlopen(f'http://127.0.0.1:{p}/healthz').getcode()==200 else 1)\""
      interval: 5s
      timeout: 3s
      retries: 30
    # H3: no-new-privileges + リソース制限。
    # 注意: core は network_mode: host で :80 をバインドする。
    # root + cap_drop ALL では CAP_NET_BIND_SERVICE が消えて :80 バインド失敗となるため
    # core の cap_drop は行わない。非 root 化 + port≥1024 or cap_add:NET_BIND_SERVICE は
    # 将来の follow-up タスクとする（リスク評価後に適用）。
    security_opt:
      - "no-new-privileges:true"
    mem_limit: 1g
    pids_limit: 256
    restart: unless-stopped

  freeswitch:
    image: ghcr.io/mizphses/millicall-freeswitch:${MILLICALL_VERSION:-latest}
    pull_policy: always
    network_mode: host
    depends_on:
      core:
        condition: service_healthy
    volumes:
      - ./data/freeswitch/directory/default.xml:/etc/freeswitch/directory/default.xml
      - ./data/freeswitch/directory/default:/etc/freeswitch/directory/default
      - ./data/freeswitch/dialplan/default.xml:/etc/freeswitch/dialplan/default.xml
      - ./data/freeswitch/sip_profiles/internal.xml:/etc/freeswitch/sip_profiles/internal.xml
      - ./data/freeswitch/sip_profiles/external.xml:/etc/freeswitch/sip_profiles/external.xml
      - ./data/freeswitch/dialplan/public.xml:/etc/freeswitch/dialplan/public.xml
      - ./data/freeswitch/autoload_configs/event_socket.conf.xml:/etc/freeswitch/autoload_configs/event_socket.conf.xml
      # ACL (millicall_trusted)。マウントしないとイメージ標準の acl.conf.xml が使われ、
      # apply-inbound-acl=millicall_trusted が未定義リスト参照となり全着信が CALL_REJECTED になる。
      - ./data/freeswitch/autoload_configs/acl.conf.xml:/etc/freeswitch/autoload_configs/acl.conf.xml
      # TTS 音声ファイルを core と同一絶対パスで共有（uuid_broadcast がこのパスを再生）。
      # 無いと AI/ワークフロー応対の音声再生が本番で無音になる。
      - ./data/freeswitch/tts:/app/data/freeswitch/tts
    # H3: FreeSWITCH は root + ネットワーク系 cap が必要なため cap_drop は行わない。
    # no-new-privileges とメモリ/PID 制限のみ適用する。
    security_opt:
      - "no-new-privileges:true"
    mem_limit: 2g
    pids_limit: 512
    restart: unless-stopped

  netd:
    image: ghcr.io/mizphses/millicall-netd:${MILLICALL_VERSION:-latest}
    pull_policy: always
    # LAN/WAN インターフェイスを直接扱うためホストネットワークを使用する。
    # dnsmasq (UDP 53/67) / Tailscale (UDP 41641) はホストのポートを直接 bind する。
    network_mode: host
    # H3: cap_drop ALL + 必要な cap のみ add（最小権限）
    # netd は nftables / ip route / Tailscale のため NET_ADMIN / NET_RAW が必要。
    # root のまま維持（dnsmasq ソケット・nft テーブル操作に必要）。
    # read_only: true は不可（/run/millicall/netd.sock 等を書き込む）— follow-up で検討。
    cap_drop:
      - ALL
    cap_add:
      - NET_ADMIN  # nftables / ip route 操作に必要
      - NET_RAW    # 低レベルソケット (Tailscale ICMP 等) に必要
    security_opt:
      - "no-new-privileges:true"
    mem_limit: 256m
    pids_limit: 64
    devices:
      # Tailscale カーネル TUN モード用。ホストに /dev/net/tun が無い場合は
      # このエントリを削除するか、entrypoint が userspace-networking で起動する。
      - "/dev/net/tun:/dev/net/tun"
    env_file:
      - .env
    environment:
      # コンテナ内では systemctl が使えないため、専用のリロードスクリプトに差し替える。
      - MILLICALL_DNSMASQ_RELOAD_CMD=/usr/local/bin/reload-dnsmasq.sh
    volumes:
      # netd が作成した UNIX ソケット (/run/millicall/netd.sock) を core と共有する。
      # 両コンテナが network_mode: host のため、ネットワーク分離は無いが
      # UNIX ソケットはファイルシステム経由のため named volume での共有が必要。
      - millicall-run:/run/millicall
      - ./data:/app/data
      # Tailscale のログイン状態・serve 設定・WantRunning を永続化する。
      # 無いとコンテナ再作成のたびにログアウトされ、one-time 認証キーでは
      # 再ログインできず「一回切れるとずっと切断中」になる。
      - ./data/tailscale:/var/lib/tailscale
    restart: unless-stopped
    # netd は core の起動に依存しない (独立してネットワーク管理を担う)。
    # core の NetdClient は接続を per-call で試みるため、netd が後から起動しても動作する。
    # Tailscale Serve: .env で MILLICALL_TAILSCALE_SERVE_ENABLED=true とすると、
    # netd は tailscale up 成功後に `tailscale serve` を張り tailnet 上で HTTPS 公開する。

  # ------------------------------------------------------------------
  # cloudflared: Cloudflare Tunnel（任意・プロファイル起動）。
  #
  #   docker compose --profile cloudflare up -d
  #
  # で起動し、Cloudflare 側で公開ホスト名 → http://localhost:<MILLICALL_HTTP_PORT>
  # のルーティングを設定する。管理画面/MCP を公開 HTTPS で提供する用途。
  # .env に MILLICALL_CLOUDFLARE_TUNNEL_TOKEN を設定すること。
  # 閉域運用ではインターネット非接続のため起動しない。
  # ------------------------------------------------------------------
  cloudflared:
    # M8: :latest を廃止して具体的なバージョンタグに固定する。
    # ダイジェスト固定 (@sha256:...) が理想 — 定期アップデート時に移行を推奨。
    image: cloudflare/cloudflared:2025.5.0
    profiles:
      - cloudflare
    network_mode: host
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${MILLICALL_CLOUDFLARE_TUNNEL_TOKEN}
    # H3: cloudflared は権限不要なため no-new-privileges + 軽量リソース制限のみ
    security_opt:
      - "no-new-privileges:true"
    mem_limit: 128m
    pids_limit: 64
    restart: unless-stopped

volumes:
  # netd と core が UNIX ソケットを共有するための named volume。
  # /run/millicall に mount され、netd.sock がここに作成される。
  millicall-run: {}
